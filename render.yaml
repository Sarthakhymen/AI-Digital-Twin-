services:
  # 1. Python Backend Service (FastAPI)
  - type: web
    name: ai-digital-twin-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 2. WhatsApp Bridge Service (Node.js + Docker)
  - type: web
    name: whatsapp-bridge
    runtime: docker
    rootDir: whatsapp-service
    plan: free # Change to starter if you need more RAM for Chrome
    envVars:
      - key: BACKEND_URL
        value: https://ai-digital-twin-backend.onrender.com # Use internal or external URL
      - key: WHATSAPP_SERVICE_PORT
        value: 3001
