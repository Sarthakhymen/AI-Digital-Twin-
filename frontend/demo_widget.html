<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Twin Demo Widget</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #334155; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; color: #e2e8f0; border-bottom-left-radius: 2px; }
        #input-area { padding: 20px; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 10px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background: #2563eb; }
        .header { padding: 15px 20px; background: #3b82f6; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="header">🤖 AI Digital Twin Chat</div>
    <div id="messages">
        <div class="message ai">Hello! I am your AI Digital Twin. How can I help you today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
        const TWIN_ID = '1';
        const API_BASE = "http://localhost:8000/api/v1";

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        const loadingDiv = appendMessage('ai', "Bhai, model load ho raha hai... (Cold start mein 2-3 min lag sakte hain)");
        input.value = '';

        try {
            console.log("Sending message to backend...");
            const response = await fetch(`${API_BASE}/integrations/${TWIN_ID}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, customer_name: "Demo User" })
            });
            
            const data = await response.json();
            loadingDiv.remove(); // Purana loading hatao

            if (data.response) {
                appendMessage('ai', data.response);
            } else {
                appendMessage('ai', "Error: " + (data.detail || JSON.stringify(data)));
            }
        } catch (error) {
            loadingDiv.remove();
            console.error("Fetch error:", error);
            appendMessage('ai', "Error connecting to server. Make sure backend is running. Error: " + error.message);
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView();
        return div;
    }
</script>

</body>
</html>
